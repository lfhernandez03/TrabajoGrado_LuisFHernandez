services:
  - type: web
    name: movie-graph-rag-api
    # Single Docker service: runs Fuseki (localhost:3030) + FastAPI (PORT)
    # Build context is the repo root to access both backend and ontologies.
    dockerfilePath: ./movie-graph-rag-backend-fastapi/Dockerfile.render
    dockerContext: .
    plan: free
    envVars:
      - key: APP_ENV
        value: production

      # MongoDB Atlas — set this in the Render dashboard (not committed here)
      - key: MONGO_URI
        sync: false

      # Fuseki runs inside the same container on localhost
      - key: FUSEKI_URL
        value: http://localhost:3030
      - key: FUSEKI_DATASET
        value: movies
      - key: FUSEKI_USER
        value: admin
      - key: FUSEKI_PASSWORD
        generateValue: true
      - key: FUSEKI_TIMEOUT_SECONDS
        value: "8"
      - key: FUSEKI_MAX_RETRIES
        value: "3"

      # AI keys — set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # Auth
      - key: JWT_SECRET
        generateValue: true

      # CORS — update to your frontend URL
      - key: CORS_ALLOWED_ORIGINS
        value: https://tudominio-frontend.vercel.app
