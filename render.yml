services:
  - type: web
    name: movie-graph-rag-api
    plan: free
    # Build context is the repo root so the Dockerfile can COPY from both
    # movie-graph-rag-backend-fastapi/ and movie-graph-rag-ontologies/
    dockerfilePath: ./movie-graph-rag-backend-fastapi/Dockerfile.render
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production

      # Set this in the Render dashboard — never commit credentials
      - key: MONGO_URI
        sync: false

      # Fuseki runs inside the same container on localhost
      - key: FUSEKI_URL
        value: http://localhost:3030
      - key: FUSEKI_DATASET
        value: Cine
      # No FUSEKI_USER / FUSEKI_PASSWORD — Fuseki runs without auth internally

      - key: FUSEKI_TIMEOUT_SECONDS
        value: "15"
      - key: FUSEKI_MAX_RETRIES
        value: "3"

      # AI keys — set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: JWT_SECRET
        generateValue: true

      - key: CORS_ALLOWED_ORIGINS
        value: https://movie-graph-rag-frontend.vercel.app

      - key: MAX_MOVIES
        value: "5000"
