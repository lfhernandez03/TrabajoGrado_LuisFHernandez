version: '3.8'

services:
  graphdb:
    image: ontotext/graphdb:10.7.0
    container_name: movie-graph-rag-graphdb
    ports:
      - "7200:7200"
    environment:
      - GDB_JAVA_OPTS=-Xmx4g
      - GDB_HEAP_INIT=2g
    volumes:
      - graphdb-data:/var/lib/graphdb
      - ./scripts/graphdb-init:/opt/graphdb-init
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/graphdb/rest/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movie-rag-network

volumes:
  graphdb-data:
    driver: local

networks:
  movie-rag-network:
    driver: bridge
