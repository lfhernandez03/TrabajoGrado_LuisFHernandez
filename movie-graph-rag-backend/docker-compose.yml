version: '3.8'

services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: movie-graph-rag-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
    volumes:
      - fuseki-data:/fuseki
    networks:
      - movie-rag-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fuseki-data:
    driver: local

networks:
  movie-rag-network:
    driver: bridge