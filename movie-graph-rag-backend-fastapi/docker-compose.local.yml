# Versión para desarrollo local con MongoDB Atlas (sin MongoDB local)
# Uso: docker-compose -f docker-compose.local.yml up

version: '3.8'

services:
  # Apache Fuseki - Triple Store
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: movie-rag-fuseki-local
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: admin
      JVM_ARGS: -Xmx2g
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data_local:/fuseki
    networks:
      - movie-rag-network-local
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application (conecta a MongoDB Atlas externo)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-rag-api-local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Application
      APP_ENV: development
      APP_PORT: 8000
      
      # MongoDB Atlas - conexión externa
      MONGO_URI: ${MONGO_URI}
      
      # Fuseki local
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: Cine
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: admin
      
      # API Keys
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.3-70b-versatile
      
      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    
    depends_on:
      fuseki:
        condition: service_healthy
    
    volumes:
      - ./app:/app/app:ro
      - ./tests:/app/tests:ro
    
    networks:
      - movie-rag-network-local

volumes:
  fuseki_data_local:
    driver: local

networks:
  movie-rag-network-local:
    driver: bridge
