# Versión para desarrollo local con MongoDB Atlas (sin MongoDB local)
# Uso: docker-compose -f docker-compose.local.yml up

version: '3.8'

services:
  # Apache Fuseki - Triple Store
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: movie-rag-fuseki-local
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: admin
      JVM_ARGS: -Xmx2g
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data_local:/fuseki
      - ../../movie-graph-rag-ontologies/data/ontologies:/ontologies:ro
    networks:
      - movie-rag-network-local
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Carga automática de ontologías en Fuseki (se ejecuta una sola vez)
  data-loader:
    image: alpine:3
    container_name: movie-rag-data-loader
    restart: "no"
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      - ../../movie-graph-rag-ontologies/data/ontologies:/ontologies:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1

        # Idempotencia: si el dataset ya tiene datos, salir
        echo "[data-loader] Verificando si los datos ya estan cargados..."
        if curl -sf -u admin:admin "http://localhost:3030/Cine/query" \
            --data "query=ASK%20%7B%20%3Fs%20%3Fp%20%3Fo%20%7D" 2>/dev/null \
            | grep -q '"boolean":true'; then
          echo "[data-loader] Datos ya cargados, omitiendo carga."
          exit 0
        fi

        echo "[data-loader] Creando dataset 'Cine'..."
        curl -sf -u admin:admin -X POST "http://localhost:3030/$$/datasets" \
          --data "dbName=Cine&dbType=tdb2" \
          && echo "[data-loader] Dataset creado." \
          || echo "[data-loader] Dataset ya existe (OK)."

        for f in \
            /ontologies/base/movie-ontology.ttl \
            /ontologies/base/context-ontology.ttl \
            /ontologies/bridge/bridge-ontology.ttl \
            /ontologies/instances/movies_data.ttl \
            /ontologies/instances/bridge_data.ttl; do
          echo "[data-loader] Cargando $$(basename $$f)..."
          if ! curl -sf -u admin:admin -X POST "http://localhost:3030/Cine/data" \
              -H "Content-Type: text/turtle" \
              --data-binary "@$$f"; then
            echo "[data-loader] ERROR al cargar $$f"
            exit 1
          fi
        done
        echo "[data-loader] Todas las ontologias cargadas exitosamente."
    networks:
      - movie-rag-network-local

  # FastAPI Application (conecta a MongoDB Atlas externo)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-rag-api-local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Application
      APP_ENV: development
      APP_PORT: 8000
      
      # MongoDB Atlas - conexión externa
      MONGO_URI: ${MONGO_URI}
      
      # Fuseki local
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: Cine
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: admin
      
      # API Keys
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.3-70b-versatile
      
      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    
    depends_on:
      fuseki:
        condition: service_healthy
      data-loader:
        condition: service_completed_successfully

    volumes:
      - ./app:/app/app:ro
      - ./tests:/app/tests:ro
    
    networks:
      - movie-rag-network-local

volumes:
  fuseki_data_local:
    driver: local

networks:
  movie-rag-network-local:
    driver: bridge
