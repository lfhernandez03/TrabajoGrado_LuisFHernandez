version: '3.8'

services:
  # MongoDB - Base de datos principal
  mongodb:
    image: mongo:7.0-alpine
    container_name: movie-rag-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password}
      MONGO_INITDB_DATABASE: movie-graph-rag
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - movie-rag-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Apache Fuseki - Triple Store
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: movie-graph-rag-fuseki
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${FUSEKI_PASSWORD:-admin}
      JVM_ARGS: -Xmx2g
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data:/fuseki
    networks:
      - movie-rag-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-graph-rag-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Application
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8000
      
      # MongoDB - usa hostname del servicio en compose
      MONGO_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASS:-password}@mongodb:27017/movie-graph-rag?authSource=admin
      
      # Fuseki - usa hostname del servicio en compose
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ${FUSEKI_DATASET:-Cine}
      FUSEKI_USER: ${FUSEKI_USER:-admin}
      FUSEKI_PASSWORD: ${FUSEKI_PASSWORD:-admin}
      FUSEKI_TIMEOUT_SECONDS: 8
      FUSEKI_MAX_RETRIES: 3
      
      # API Keys
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      
      # Admin
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    
    depends_on:
      mongodb:
        condition: service_healthy
      fuseki:
        condition: service_healthy
    
    volumes:
      - ./app:/app/app:ro
      - ./tests:/app/tests:ro
    
    networks:
      - movie-graph-rag-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  fuseki_data:
    driver: local

networks:
  movie-rag-network:
    driver: bridge
